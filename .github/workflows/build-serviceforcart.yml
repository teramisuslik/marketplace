name: Build serviceForCart

on:
  push:
    paths:
      - 'ServiceForCart/**'
      - '.github/workflows/build-serviceforcart.yml'
  pull_request:
    paths:
      - 'ServiceForCart/**'
      - '.github/workflows/build-serviceforcart.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build
        run: |
          cd ServiceForCart
          mvn clean verify