name: Build ServiceForPay

on:
  push:
    paths:
      - 'ServiceForPay/**'
      - '.github/workflows/build-serviceforpay.yml'
  pull_request:
    paths:
      - 'ServiceForPay/**'
      - '.github/workflows/build-serviceforpay.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build
        run: |
          cd ServiceForPay
          mvn clean verify