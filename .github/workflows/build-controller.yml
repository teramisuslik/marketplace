name: Build Controller

on:
  push:
    paths:
      - 'Controller/**'
      - '.github/workflows/build-controller.yml'
  pull_request:
    paths:
      - 'Controller/**'
      - '.github/workflows/build-controller.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build
        run: |
          cd Controller
          mvn clean verify