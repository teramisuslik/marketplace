spring:
  application:
    name: serviceForCart
  datasource:
    url: jdbc:postgresql://localhost:5432/Cart
    username: postgres
    password: 1234
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
server:
  port: 8083